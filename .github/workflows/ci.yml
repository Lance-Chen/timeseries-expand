name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, pandas ${{ matrix.pandas }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        pandas: ["2.2"]
        include:
          - python-version: "3.11"
            pandas: "2.2"
            coverage: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies (pandas ${{ matrix.pandas }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pandas==${{ matrix.pandas }}.*"
          python -m pip install -e ".[dev,polars]"

      - name: Lint with ruff
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type check with mypy
        run: mypy src

      - name: Run tests
        env:
          TZ: UTC
        run: |
          pytest tests/ -v ${{ matrix.coverage && '--cov-report=xml --cov-append' || '' }}

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/